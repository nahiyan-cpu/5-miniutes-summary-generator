<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Summary Generator | সারাংশ জেনারেটর</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }
        .card { background: #fff; border: 1px solid var(--border); padding: 24px; border-radius: 16px; margin-bottom: 20px; }
        textarea { width: 100%; height: 250px; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; resize: vertical; box-sizing: border-box; }
        .btn { cursor: pointer; background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 600; margin: 5px; }
        .history-card { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 8px; }
        .history-card:hover { background: #eef2ff; }
        #outputBox { background: #ffffff; border: 1px solid var(--border); padding: 25px; border-radius: 12px; min-height: 250px; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto; line-height: 1.8; font-size: 1.1rem; }
        .metrics-bar { display: flex; gap: 20px; margin: 20px 0; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>History / ইতিহাস</h2>
    <div id="historyList"></div>
</div>

<div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>5-Minute Summary Generator</h1>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <div id="authView" class="card">
        <input type="email" id="email" placeholder="Email" style="padding:10px; width:90%">
        <input type="password" id="pass" placeholder="Password" style="padding:10px; width:90%; margin-top:10px;">
        <button class="btn" onclick="handleAuth()">Login / Register</button>
        <div id="error-msg" style="color:red; margin-top:10px;"></div>
    </div>

    <div id="appView" style="display:none;">
        <textarea id="inputText" placeholder="Paste your text here..." oninput="calculateMetrics()"></textarea>
        <div style="margin: 15px 0;">
            <select id="lenSel"><option value="3">Short</option><option value="6">Medium</option><option value="12">Detailed</option></select>
            <button class="btn" onclick="runSummarizer()">Generate Summary / সামারি তৈরি করুন</button>
            <button class="btn" style="background:#64748b;" onclick="clearAll()">Clear</button>
        </div>

        <div class="metrics-bar">
            <span>Orig Words: <span id="origCount">0</span></span>
            <span>Sum Words: <span id="sumCount">0</span></span>
        </div>

        <h3>Output Workspace</h3>
        <div id="outputBox">Results will appear here...</div>
        <button class="btn" style="margin-top:15px;" onclick="copyOutput()">Copy to Clipboard</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgYU3Gv3itIh70wPfcQIA6epqPo12RWs8",
        authDomain: "miniutes-summary-generator.firebaseapp.com",
        projectId: "miniutes-summary-generator",
        storageBucket: "miniutes-summary-generator.firebasestorage.app",
        messagingSenderId: "543847855566",
        appId: "1:543847855566:web:2f80a39d1c5526c3f0e79f",
        measurementId: "G-1FHTVDNB0J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.runSummarizer = async () => {
        const text = document.getElementById('inputText').value;
        if (!text.trim()) return;
        const sentences = text.split(/[.?!|]+/).filter(s => s.trim().length > 10);
        const topCount = parseInt(document.getElementById('lenSel').value);
        const result = sentences.slice(0, topCount).join('. ') + '.';
        
        document.getElementById('outputBox').innerText = result;
        calculateMetrics();
        await addDoc(collection(db, "summaries"), { userId: auth.currentUser.uid, originalText: text, summary: result, createdAt: new Date() });
    };

    window.copyOutput = () => {
        const text = document.getElementById('outputBox').innerText;
        navigator.clipboard.writeText(text).then(() => alert("Copied to clipboard!"));
    };

    window.calculateMetrics = () => {
        const full = document.getElementById('inputText').value.split(/\s+/).filter(x=>x).length;
        const summ = document.getElementById('outputBox').innerText.split(/\s+/).filter(x=>x).length;
        document.getElementById('origCount').innerText = full;
        document.getElementById('sumCount').innerText = summ;
    };

    window.handleAuth = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); }
        catch { await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        document.getElementById('authView').style.display = user ? 'none' : 'block';
        document.getElementById('appView').style.display = user ? 'block' : 'none';
        if(user) {
            onSnapshot(query(collection(db, "summaries"), where("userId", "==", user.uid)), (snap) => {
                const list = document.getElementById('historyList');
                list.innerHTML = "";
                snap.docs.sort((a,b) => b.data().createdAt - a.data().createdAt).forEach(d => {
                    const item = document.createElement('div');
                    item.className = "history-card";
                    item.innerText = d.data().summary.substring(0,50) + "...";
                    item.onclick = () => {
                        document.getElementById('inputText').value = d.data().originalText;
                        document.getElementById('outputBox').innerText = d.data().summary;
                        calculateMetrics();
                    };
                    list.appendChild(item);
                });
            });
        }
    });

    window.clearAll = () => { document.getElementById('inputText').value = ""; document.getElementById('outputBox').innerText = ""; calculateMetrics(); };
</script>
</body>
</html>
