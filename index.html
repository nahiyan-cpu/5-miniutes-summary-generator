<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Minute Summary Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        const firebaseConfig = {
            apiKey: "AIzaSyBgYU3Gv3itIh70wPfcQIA6epqPo12RWs8",
            authDomain: "miniutes-summary-generator.firebaseapp.com",
            projectId: "miniutes-summary-generator",
            storageBucket: "miniutes-summary-generator.firebasestorage.app",
            messagingSenderId: "543847855566",
            appId: "1:543847855566:web:2f80a39d1c5526c3f0e79f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auth Logic
        window.handleAuth = async (isSignup) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isSignup) await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
                alert("Success!");
            } catch (e) { alert(e.message); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authPanel = document.getElementById('authPanel');
            if (user) {
                authPanel.innerHTML = `<p class="text-xs mb-2">Logged in as: ${user.email}</p>
                                       <button onclick="handleLogout()" class="w-full bg-red-600/80 p-2 rounded text-sm">Logout</button>`;
            }
        });

        window.generateSummary = async () => {
            const key = document.getElementById('apiKey').value;
            const text = document.getElementById('textInput').value;
            if(!key) return alert("API Key ইম্পুট করুন!");
            
            const model = new GoogleGenerativeAI(key).getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(`Summarize this: ${text}`);
            const response = await result.response.text();
            
            document.getElementById('output').innerHTML = response.replace(/\n/g, '<br>');
            
            if(auth.currentUser) {
                await addDoc(collection(db, "summaries"), {
                    userId: auth.currentUser.uid,
                    summary: response,
                    timestamp: serverTimestamp()
                });
            }
        };
    </script>
</head>
<body class="bg-[#0a0a0f] text-gray-200 min-h-screen flex p-4">

    <!-- Sidebar -->
    <aside class="w-80 glass p-6 rounded-2xl mr-4 flex flex-col">
        <h2 class="text-xl font-bold mb-6">Auth Panel</h2>
        <div id="authPanel" class="space-y-3">
            <input type="email" id="email" placeholder="Email" class="w-full p-2 rounded bg-white/5 border border-white/10 outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 rounded bg-white/5 border border-white/10 outline-none">
            <div class="flex gap-2">
                <button onclick="handleAuth(false)" class="flex-1 bg-blue-600/80 p-2 rounded text-sm">Login</button>
                <button onclick="handleAuth(true)" class="flex-1 bg-green-600/80 p-2 rounded text-sm">Sign Up</button>
            </div>
        </div>
        <div class="mt-8 pt-8 border-t border-white/10">
            <input type="password" id="apiKey" placeholder="Gemini API Key" class="w-full p-2 rounded bg-black/40 border border-white/10 text-sm">
        </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 glass p-8 rounded-2xl">
        <h1 class="text-2xl font-bold mb-6">5-Minute Summary Generator</h1>
        <textarea id="textInput" rows="8" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none" placeholder="Paste text here..."></textarea>
        <button onclick="generateSummary()" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl transition">Generate Summary</button>
        <div id="output" class="mt-8 p-6 bg-black/40 rounded-xl border border-white/10 min-h-[100px]"></div>
    </main>

</body>
</html>
