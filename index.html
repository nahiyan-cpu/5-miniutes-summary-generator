<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Minute Summary Generator | সারাংশ জেনারেটর</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f9fafb;
            --card: #ffffff;
            --text: #111827;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: var(--primary); }
        textarea { width: 100%; height: 150px; padding: 12px; margin: 10px 0; border: 1px solid #d1d5db; border-radius: 8px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { opacity: 0.9; }
        .auth-section, .app-section { margin-top: 20px; }
        .history-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        .error { color: #dc2626; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>5-Minute Summary Generator</h1>
    <h2 style="font-size: 1.2rem;">সারাংশ জেনারেটর</h2>

    <div id="auth-ui" class="auth-section">
        <input type="email" id="email" placeholder="Email / ইমেইল">
        <input type="password" id="pass" placeholder="Password / পাসওয়ার্ড">
        <button onclick="handleAuth()">Login/Register | লগইন/রেজিস্ট্রেশন</button>
        <div id="error-msg" class="error"></div>
    </div>

    <div id="app-ui" class="app-section" style="display:none;">
        <textarea id="inputText" placeholder="Paste your text here... / এখানে টেক্সট দিন..."></textarea>
        <button id="generateBtn">Generate Summary | সারাংশ তৈরি করুন</button>
        
        <h3>History | ইতিহাস</h3>
        <div id="historyList"></div>
        <button onclick="logout()" style="background:#6b7280; margin-top:20px;">Logout | লগআউট</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgYU3Gv3itIh70wPfcQIA6epqPo12RWs8",
        authDomain: "miniutes-summary-generator.firebaseapp.com",
        projectId: "miniutes-summary-generator",
        storageBucket: "miniutes-summary-generator.firebasestorage.app",
        messagingSenderId: "543847855566",
        appId: "1:543847855566:web:2f80a39d1c5526c3f0e79f",
        measurementId: "G-1FHTVDNB0J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleAuth = async () => {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
        } catch (e) {
            try { await createUserWithEmailAndPassword(auth, email, pass); }
            catch (err) { document.getElementById('error-msg').innerText = err.message; }
        }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-ui').style.display = 'none';
            document.getElementById('app-ui').style.display = 'block';
            loadHistory(user.uid);
        } else {
            document.getElementById('auth-ui').style.display = 'block';
            document.getElementById('app-ui').style.display = 'none';
        }
    });

    document.getElementById('generateBtn').onclick = async () => {
        const text = document.getElementById('inputText').value;
        if (!text) return;
        try {
            // Simple logic: taking first 100 chars as 'summary'
            const summary = text.substring(0, 100) + "...";
            await addDoc(collection(db, "summaries"), {
                userId: auth.currentUser.uid,
                originalText: text,
                summary: summary,
                createdAt: new Date()
            });
            document.getElementById('inputText').value = '';
        } catch (err) { alert("Error saving: " + err.message); }
    };

    function loadHistory(uid) {
        const q = query(collection(db, "summaries"), where("userId", "==", uid));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            // Client-side sorting by date
            const docs = snapshot.docs.sort((a, b) => b.data().createdAt - a.data().createdAt);
            docs.forEach(doc => {
                const data = doc.data();
                list.innerHTML += `<div class="history-item"><strong>Summary:</strong> ${data.summary}</div>`;
            });
        }, (err) => {
            document.getElementById('historyList').innerHTML = `<p class="error">Listener Error: ${err.message}</p>`;
        });
    }
</script>
</body>
</html>
