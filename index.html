
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Minute Summary Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-200 min-h-screen flex p-4">

    <!-- Sidebar -->
    <aside class="w-80 glass p-6 rounded-2xl mr-4 flex flex-col">
        <h2 class="text-xl font-bold mb-6 text-blue-400">Auth & Settings</h2>
        <div id="authPanel" class="space-y-3">
            <input type="email" id="email" placeholder="Email" class="w-full p-2 rounded bg-white/5 border border-white/10 outline-none">
            <input type="password" id="password" placeholder="Password" class="w-full p-2 rounded bg-white/5 border border-white/10 outline-none">
            <div class="flex gap-2">
                <button onclick="handleAuth(false)" class="flex-1 bg-blue-600/80 p-2 rounded text-sm hover:bg-blue-500">Login</button>
                <button onclick="handleAuth(true)" class="flex-1 bg-green-600/80 p-2 rounded text-sm hover:bg-green-500">Sign Up</button>
            </div>
        </div>
        <div class="mt-8 pt-8 border-t border-white/10">
            <label class="text-xs text-gray-400 mb-2 block">Gemini API Key</label>
            <input type="password" id="apiKey" placeholder="Paste your API key here" class="w-full p-2 rounded bg-black/40 border border-white/10 text-sm outline-none">
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 glass p-8 rounded-2xl">
        <h1 class="text-2xl font-bold mb-6">5-Minute Summary Generator</h1>
        <textarea id="textInput" rows="8" class="w-full p-4 rounded-xl bg-white/5 border border-white/10 mb-4 outline-none focus:border-blue-500" placeholder="Paste your article or text here..."></textarea>
        <button id="genBtn" onclick="generateSummary()" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl transition w-full font-bold">Generate Summary</button>
        <div id="output" class="mt-8 p-6 bg-black/40 rounded-xl border border-white/10 min-h-[150px] whitespace-pre-line text-sm leading-relaxed text-gray-300">
            Summary will appear here after generation...
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBgYU3Gv3itIh70wPfcQIA6epqPo12RWs8",
            authDomain: "miniutes-summary-generator.firebaseapp.com",
            projectId: "miniutes-summary-generator",
            storageBucket: "miniutes-summary-generator.firebasestorage.app",
            messagingSenderId: "543847855566",
            appId: "1:543847855566:web:2f80a39d1c5526c3f0e79f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleAuth = async (isSignup) => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isSignup) await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
                alert("Login/Sign-up Successful!");
            } catch (e) { alert("Error: " + e.message); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authPanel = document.getElementById('authPanel');
            if (user) {
                authPanel.innerHTML = `<p class="text-xs text-blue-400 mb-2 truncate">Logged in: ${user.email}</p>
                                       <button onclick="handleLogout()" class="w-full bg-red-600/80 p-2 rounded text-sm hover:bg-red-500">Logout</button>`;
            }
        });

        window.generateSummary = async () => {
            const key = document.getElementById('apiKey').value;
            const text = document.getElementById('textInput').value;
            const output = document.getElementById('output');
            const btn = document.getElementById('genBtn');

            if(!key || !text) return alert("Please enter both API Key and text!");
            
            btn.innerText = "Generating...";
            output.innerText = "Processing, please wait...";

            try {
                // মডেলের নাম পরিবর্তন করে gemini-1.5-flash রাখা হয়েছে কিন্তু endpoint এ v1beta এর বদলে v1 ব্যবহার করা হয়েছে
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Summarize this text in a professional, concise, and structured format: " + text }] }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                } else if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    const summaryText = data.candidates[0].content.parts[0].text;
                    output.innerText = summaryText;

                    if(auth.currentUser) {
                        await addDoc(collection(db, "summaries"), {
                            userId: auth.currentUser.uid,
                            summary: summaryText,
                            timestamp: serverTimestamp()
                        });
                    }
                } else {
                    throw new Error("Invalid response from Gemini API.");
                }
            } catch (e) {
                output.innerText = "Error: " + e.message;
            } finally {
                btn.innerText = "Generate Summary";
            }
        };
    </script>
</body>
</html>
