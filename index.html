<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Summary Generator | সারাংশ জেনারেটর</title>
    <style>
        :root {
            --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff;
            --text: #1e293b; --border: #e2e8f0;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar { width: 320px; background: #fff; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 40px; }
        
        /* Components */
        .card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 16px; margin-bottom: 20px; }
        textarea { width: 100%; height: 200px; padding: 15px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; resize: none; box-sizing: border-box; }
        .btn { cursor: pointer; background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; }
        .history-card { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; }
        .history-card:hover { background: #f1f5f9; }
        
        #outputBox { background: #fdfdfd; border: 1px solid var(--border); padding: 20px; border-radius: 12px; min-height: 200px; white-space: pre-wrap; }
        .metrics-bar { display: flex; gap: 20px; margin: 20px 0; font-weight: bold; }
        .delete-btn { color: red; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Past Summaries / ইতিহাস</h2>
    <div id="historyList"></div>
</div>

<div class="main">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>5-Minute Summary Generator</h1>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <!-- Auth View -->
    <div id="authView" class="card">
        <input type="email" id="email" placeholder="Email" style="padding:10px; width:90%">
        <input type="password" id="pass" placeholder="Password" style="padding:10px; width:90%; margin-top:10px;">
        <button class="btn" onclick="handleAuth()" style="margin-top:10px;">Login / Register</button>
        <div id="error-msg" style="color:red; margin-top:10px;"></div>
    </div>

    <!-- App View -->
    <div id="appView" style="display:none;">
        <textarea id="inputText" placeholder="Paste long text here..." oninput="calculateMetrics()"></textarea>
        <div style="margin-top:15px;">
            <select id="lenSel"><option>Short</option><option>Detailed</option></select>
            <select id="toneSel"><option>Professional</option><option>Casual</option></select>
            <button class="btn" onclick="generateSummary()">Generate Summary / সামারি তৈরি করুন</button>
            <button class="btn" style="background:#64748b;" onclick="clearAll()">Clear</button>
        </div>

        <div class="metrics-bar">
            <span>Orig: <span id="origCount">0</span></span>
            <span>Summary: <span id="sumCount">0</span></span>
            <span>Read: <span id="readTime">0m</span></span>
        </div>

        <h3>Output Workspace</h3>
        <div id="outputBox">Results will appear here...</div>
        <div style="margin-top:10px;">
            <button class="btn" onclick="copyText()">Copy</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBgYU3Gv3itIh70wPfcQIA6epqPo12RWs8",
        authDomain: "miniutes-summary-generator.firebaseapp.com",
        projectId: "miniutes-summary-generator",
        storageBucket: "miniutes-summary-generator.firebasestorage.app",
        messagingSenderId: "543847855566",
        appId: "1:543847855566:web:2f80a39d1c5526c3f0e79f",
        measurementId: "G-1FHTVDNB0J"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.handleAuth = async () => {
        try { await signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); }
        catch { await createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value); }
    };

    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (user) => {
        document.getElementById('authView').style.display = user ? 'none' : 'block';
        document.getElementById('appView').style.display = user ? 'block' : 'none';
        if(user) loadHistory(user.uid);
    });

    window.generateSummary = async () => {
        const text = document.getElementById('inputText').value;
        const summary = "SUMMARIZED: " + text.split('.').slice(0, 3).join('. ') + "..."; // Placeholder Logic
        document.getElementById('outputBox').innerText = summary;
        calculateMetrics();
        await addDoc(collection(db, "summaries"), { userId: auth.currentUser.uid, originalText: text, summary, createdAt: new Date() });
    };

    window.calculateMetrics = () => {
        const t = document.getElementById('inputText').value.split(/\s+/).filter(x=>x).length;
        document.getElementById('origCount').innerText = t;
        document.getElementById('sumCount').innerText = Math.floor(t * 0.3);
        document.getElementById('readTime').innerText = Math.ceil(t/200) + 'm';
    };

    window.loadHistory = (uid) => {
        onSnapshot(query(collection(db, "summaries"), where("userId", "==", uid)), (snap) => {
            const list = document.getElementById('historyList');
            list.innerHTML = "";
            snap.forEach(d => {
                const item = document.createElement('div');
                item.className = "history-card";
                item.innerHTML = `<div>${d.data().summary.substring(0,30)}...</div> <span class="delete-btn" onclick="event.stopPropagation(); deleteItem('${d.id}')">Delete</span>`;
                item.onclick = () => {
                    document.getElementById('inputText').value = d.data().originalText;
                    document.getElementById('outputBox').innerText = d.data().summary;
                    calculateMetrics();
                };
                list.appendChild(item);
            });
        });
    };

    window.deleteItem = async (id) => { await deleteDoc(doc(db, "summaries", id)); };
    window.clearAll = () => { document.getElementById('inputText').value = ""; document.getElementById('outputBox').innerText = ""; };
    window.copyText = () => navigator.clipboard.writeText(document.getElementById('outputBox').innerText);
</script>
</body>
</html>
