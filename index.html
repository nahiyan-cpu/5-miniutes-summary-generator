<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5-Minute Summary Generator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBgYU3Gv3itIh70wPfcQIA6epqPo12RWs8",
            authDomain: "miniutes-summary-generator.firebaseapp.com",
            projectId: "miniutes-summary-generator",
            storageBucket: "miniutes-summary-generator.firebasestorage.app",
            messagingSenderId: "543847855566",
            appId: "1:543847855566:web:2f80a39d1c5526c3f0e79f"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // UI Logic
        window.handleLogin = () => signInWithPopup(auth, provider);
        window.handleLogout = () => signOut(auth);

        window.generateSummary = async () => {
            const key = document.getElementById('apiKey').value;
            const text = document.getElementById('textInput').value;
            if(!key) return alert("API Key দিন!");
            
            document.getElementById('output').innerHTML = "জেনারেট হচ্ছে...";
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(`Summarize this: ${text}`);
            const response = await result.response.text();
            
            document.getElementById('output').innerHTML = response.replace(/\n/g, '<br>');
            
            // Firestore-এ সেভ
            const user = auth.currentUser;
            if(user) {
                await addDoc(collection(db, "summaries"), {
                    userId: user.uid,
                    text: response,
                    timestamp: serverTimestamp()
                });
            }
        };
    </script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-5">

    <div class="max-w-4xl mx-auto bg-gray-800 p-8 rounded-2xl shadow-2xl border border-gray-700">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">5-Minute Summary Generator</h1>
        
        <!-- API Key Input -->
        <input type="password" id="apiKey" placeholder="Gemini API Key দিন" 
               class="w-full p-3 mb-4 bg-gray-700 rounded border border-gray-600 outline-none">
        
        <!-- Textarea -->
        <textarea id="textInput" rows="6" placeholder="এখানে টেক্সট পেস্ট করুন..." 
                  class="w-full p-4 mb-4 bg-gray-900 rounded border border-gray-700 outline-none"></textarea>
        
        <!-- Action Buttons -->
        <div class="flex gap-4">
            <button onclick="handleLogin()" class="bg-blue-600 px-6 py-2 rounded">Google Login</button>
            <button onclick="generateSummary()" class="bg-green-600 px-6 py-2 rounded">জেনারেট করুন</button>
        </div>

        <!-- Output -->
        <div id="output" class="mt-8 p-6 bg-black rounded-lg border border-gray-700 leading-relaxed">
            সারসংক্ষেপ এখানে প্রদর্শিত হবে...
        </div>
    </div>

</body>
</html>
